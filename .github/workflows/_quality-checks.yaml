name: Quality Checks
permissions:
  contents: read

on:
  workflow_call:

jobs:

  linting:
    uses: ./.github/workflows/_node_job.yaml
    with:
      name: 🧹  Linting
      run: pnpm lint

  typeCheck:
    uses: ./.github/workflows/_node_job.yaml
    with:
      name: 🔍  Type Check
      run: pnpm typecheck

  unitTest:
    uses: ./.github/workflows/_node_job.yaml
    with:
      name: 🧪  Unit Tests
      run: pnpm test
      timeout-minutes: 15

  unusedDependencies:
    uses: ./.github/workflows/_node_job.yaml
    with:
      name: 📦  Unused Dependencies Check
      run: pnpx knip --include dependencies

  cdkSynth:
    name: ☁️  CDK Synth
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-node-pnpm
      - name: Install compatible aws-cdk-lib version
        run: pnpm add -D aws-cdk-lib ts-node constructs cdk-monitoring-constructs cdk-nag
        working-directory: tests/test-project
      - run: pnpx cdk synth --all
        working-directory: tests/test-project

